# version: '3.8'

services:
  php:
    build:
      context: ./src
      dockerfile: Dockerfile
    platform: linux/amd64
    ports:
      - 8080:80
    volumes:
      - ./src:/var/www/html # cosi non dobbiamo ribuildare il docker per ogni modifica
    depends_on:
      - db

  db:
    image: mysql:5.7
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"
    volumes:
      - ./src/create_db.sql:/docker-entrypoint-initdb.d/create_db.sql